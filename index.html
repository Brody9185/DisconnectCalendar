<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SyncTrack Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>SyncTrack Pro</h1>
        <select id="gantt-view-mode">
            <option value="Day">Day View</option>
            <option value="Week">Week View</option>
            <option value="Month">Month View</option>
        </select>
    </header>
    <main id="main-layout">
        <aside id="sidebar" class="card">
            <h3>Project Manager</h3>
            <select id="project-selector"></select> 
            <div class="project-btns">
                <button id="new-project" class="btn-secondary">New</button>
                <button id="delete-project" class="btn-danger-outline">Delete</button>
            </div>
            <hr>
            <h3>Task Details</h3>
            <input type="text" id="task-name" placeholder="Project Name">
            <input type="text" id="task-owner" placeholder="Contributors">
            <div id="color-picker">
                <div class="color-sq active" data-color="blue" style="background:#3b82f6"></div>
                <div class="color-sq" data-color="red" style="background:#ef4444"></div>
                <div class="color-sq" data-color="green" style="background:#10b981"></div>
                <div class="color-sq" data-color="orange" style="background:#f59e0b"></div>
                <div class="color-sq" data-color="purple" style="background:#a855f7"></div>
                <div class="color-sq" data-color="pink" style="background:#ec4899"></div>
                <div class="color-sq" data-color="cyan" style="background:#06b6d4"></div>
                <div class="color-sq" data-color="yellow" style="background:#eab308"></div>
            </div>
            <button id="add-task-btn" class="btn-primary" disabled>Add Task</button>
        </aside>
        <div id="display-area">
            <div class="card calendar-container"><div id="calendar"></div></div>
            <div class="card gantt-container">
                <div id="gantt-wrapper"><svg id="gantt"></svg></div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
